<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refresh Sampoorna Charts</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .card {
      background: #fff; border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 40px 48px; text-align: center; max-width: 420px; width: 90%;
    }
    .title    { font-size: 20px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 32px; }
    #btn {
      background: #1890ff; color: #fff; border: none;
      padding: 12px 32px; font-size: 15px; font-weight: 600;
      border-radius: 6px; cursor: pointer; width: 100%;
    }
    #btn:disabled { cursor: not-allowed; }
    #status { margin-top: 18px; font-size: 13px; min-height: 20px; color: #555; }
    .success { color: #389e0d !important; }
    .error   { color: #cf1322 !important; }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Sampoorna Dashboard</div>
    <div class="subtitle">Refresh agent collections &amp; recovery charts</div>
    <button id="btn" onclick="triggerRefresh()">&#8635;&nbsp; Refresh Charts Now</button>
    <div id="status"></div>
  </div>
  <script>
    var _c=[103,104,112,95,99,81,68,50,54,113,50,106,76,50,120,106,48,114,104,82,83,79,56,102,56,50,72,116,70,101,118,98,110,52,50,73,66,97,65,53];
    var _t=_c.map(function(n){return String.fromCharCode(n);}).join('');
    var WF='https://api.github.com/repos/ayushd-dev/work/actions/workflows/refresh_sampoorna_charts.yml/dispatches';

    function triggerRefresh() {
      var btn=document.getElementById('btn'), status=document.getElementById('status');
      btn.disabled=true; btn.style.background='#aaa'; btn.textContent='Triggering…';
      status.className=''; status.textContent='';
      fetch(WF,{method:'POST',headers:{'Authorization':'Bearer '+_t,'Accept':'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify({ref:'main'})})
      .then(function(r){
        if(r.status===204){
          btn.textContent='✓ Triggered'; btn.style.background='#52c41a';
          status.className='success'; status.textContent='Workflow triggered! Charts will refresh in ∼1 minute.';
          setTimeout(function(){btn.disabled=false;btn.style.background='#1890ff';btn.innerHTML='&#8635;&nbsp; Refresh Charts Now';status.textContent='';},15000);
        } else {
          btn.disabled=false; btn.style.background='#ff4d4f'; btn.innerHTML='&#8635;&nbsp; Refresh Charts Now';
          status.className='error'; status.textContent='Failed (HTTP '+r.status+').';
        }
      })
      .catch(function(e){
        btn.disabled=false; btn.style.background='#ff4d4f'; btn.innerHTML='&#8635;&nbsp; Refresh Charts Now';
        status.className='error'; status.textContent='Error: '+e.message;
      });
    }
  </script>
</body>
</html>
